version: "3.1"
services:
  postgres:
    container_name: postgres
    image: postgres
    restart: always
    ports:
      - "9999:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=db
    volumes:
      - ./Databases:/var/lib/postgresql/data

  mongo:
    image: mongo
    restart: always
    ports:
      - "27019:27019"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
